<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" role="img" aria-label="AlertaVuln">
  <title>AlertaVuln</title>
  <defs>
    <linearGradient id="avAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="avHexFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1b24"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
    <linearGradient id="avShieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#eab308"/>
      <stop offset="70%" stop-color="#eab308"/>
      <stop offset="70%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Outer hex frame (matches BOS wordmark mark) -->
  <g transform="translate(6 6)">
    <path d="M30 0 L57 14 L57 46 L30 60 L3 46 L3 14 Z"
          fill="url(#avHexFill)" stroke="url(#avAccent)" stroke-width="2"/>
    <path d="M30 6 L51 17 L51 43 L30 54 L9 43 L9 17 Z"
          fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.45"/>

    <!-- Real AlertaVuln shield, scaled to fit (their 64-unit shield → 36-unit, centred on 30,30) -->
    <g transform="translate(30 30) scale(0.5625) translate(-32 -32)">
      <path d="M32 4 L56 16 L56 32 C56 48 44 58 32 62 C20 58 8 48 8 32 L8 16 Z"
            fill="url(#avShieldGrad)" stroke="#1e293b" stroke-width="2"/>
      <path d="M32 10 L50 20 L50 32 C50 44 40 53 32 56 C24 53 14 44 14 32 L14 20 Z"
            fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="14" y1="27" x2="50" y2="27" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="12" y1="40" x2="52" y2="40" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, 'Segoe UI', sans-serif" fill="#ffffff">
    <text x="80" y="34" font-size="22" font-weight="800" letter-spacing="2">
      ALERTA<tspan fill="url(#avAccent)">VULN</tspan>
    </text>
    <text x="80" y="54" font-size="9" font-weight="600" letter-spacing="3.4" fill="#9a9aa8">
      VULNERABILITY · MONITORING
    </text>
  </g>
</svg>
