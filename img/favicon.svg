<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Black Ops Solutions">
  <title>Black Ops Solutions</title>
  <defs>
    <linearGradient id="bosFavAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <linearGradient id="bosFavHex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1b24"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
  </defs>

  <g transform="translate(2 2)">
    <!-- Outer hex shield -->
    <path d="M30 0 L57 14 L57 46 L30 60 L3 46 L3 14 Z"
          fill="url(#bosFavHex)" stroke="url(#bosFavAccent)" stroke-width="2.5"/>

    <!-- Inner thin hex outline -->
    <path d="M30 6 L51 17 L51 43 L30 54 L9 43 L9 17 Z"
          fill="none" stroke="#ff6a00" stroke-width="0.7" opacity="0.5"/>

    <!-- Crosshair ticks -->
    <g stroke="#ff6a00" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
      <line x1="30" y1="10" x2="30" y2="15"/>
      <line x1="30" y1="45" x2="30" y2="50"/>
      <line x1="13" y1="30" x2="18" y2="30"/>
      <line x1="42" y1="30" x2="47" y2="30"/>
    </g>

    <!-- Stacked chevrons -->
    <g fill="none" stroke="url(#bosFavAccent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20,34 30,24 40,34"/>
      <polyline points="20,42 30,32 40,42" opacity="0.55"/>
    </g>

    <!-- Center dot -->
    <circle cx="30" cy="30" r="2" fill="#ff8a3d"/>
  </g>
</svg>
