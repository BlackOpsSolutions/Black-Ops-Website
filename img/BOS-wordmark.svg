<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" role="img" aria-label="Black Ops Solutions IT">
  <title>Black Ops Solutions IT</title>
  <defs>
    <linearGradient id="bosAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <linearGradient id="bosHexFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1b24"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
  </defs>

  <!-- Mark: tactical hex shield with chevrons + crosshair -->
  <g transform="translate(6 6)">
    <!-- Outer hex shield -->
    <path d="M30 0 L57 14 L57 46 L30 60 L3 46 L3 14 Z"
          fill="url(#bosHexFill)" stroke="url(#bosAccent)" stroke-width="2"/>

    <!-- Inner thin hex outline -->
    <path d="M30 6 L51 17 L51 43 L30 54 L9 43 L9 17 Z"
          fill="none" stroke="#ff6a00" stroke-width="0.6" opacity="0.45"/>

    <!-- Crosshair ticks -->
    <g stroke="#ff6a00" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
      <line x1="30" y1="10" x2="30" y2="15"/>
      <line x1="30" y1="45" x2="30" y2="50"/>
      <line x1="13" y1="30" x2="18" y2="30"/>
      <line x1="42" y1="30" x2="47" y2="30"/>
    </g>

    <!-- Stacked chevrons (military insignia) -->
    <g fill="none" stroke="url(#bosAccent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20,34 30,24 40,34"/>
      <polyline points="20,42 30,32 40,42" opacity="0.55"/>
    </g>

    <!-- Center dot -->
    <circle cx="30" cy="30" r="1.6" fill="#ff8a3d"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, 'Segoe UI', sans-serif" fill="#ffffff">
    <text x="80" y="34" font-size="22" font-weight="800" letter-spacing="2">
      BLACK <tspan fill="url(#bosAccent)">OPS</tspan>
    </text>
    <text x="80" y="54" font-size="9.5" font-weight="600" letter-spacing="6" fill="#9a9aa8">
      SOLUTIONS · IT
    </text>
  </g>
</svg>
